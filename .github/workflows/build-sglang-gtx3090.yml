# SGLang Docker Build Workflow for GTX 3090
#
# Build SGLang Docker image for CentOS 7.9 host with GTX 3090 (CUDA 12.2 + Driver 535)
# Automatically pushes to GitHub Container Registry (ghcr.io)

name: Build SGLang GTX3090 Docker Image

on:
  workflow_dispatch:
    inputs:
      sgl_version:
        description: 'SGLang version (e.g., v0.5.0) or "latest"'
        required: true
        default: 'latest'
        type: string
      build_type:
        description: 'Build type'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - astral
          - falcon
          - gptq
          - awq
          - fp8

env:
  DOCKER_BUILDKIT: 1
  CUDA_VERSION: "12.2.0"
  DOCKERFILE_PATH: docker/Dockerfile.gtx3090

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/sglang-gtx3090
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=${{ inputs.sgl_version }},enable=${{ inputs.sgl_version != 'latest' }}
            type=raw,value=latest,enable=${{ inputs.sgl_version == 'latest' }}
            type=raw,value=cuda${{ env.CUDA_VERSION }}-${{ inputs.sgl_version }}
          labels: |
            org.opencontainers.image.title=SGLang for GTX 3090
            org.opencontainers.image.description=SGLang Docker image for NVIDIA GTX 3090 (CUDA 12.2, Driver 535+)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            sgl.version=${{ inputs.sgl_version }}
            cuda.version=${{ env.CUDA_VERSION }}
            gpu.model=GTX 3090

      - name: Determine SGLang install method
        id: sgl_config
        run: |
          if [ "${{ inputs.sgl_version }}" == "latest" ]; then
            echo "use_latest=1" >> $GITHUB_OUTPUT
            echo "sgl_version=" >> $GITHUB_OUTPUT
          else
            echo "use_latest=0" >> $GITHUB_OUTPUT
            echo "sgl_version=${{ inputs.sgl_version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/sglang-gtx3090:${{ inputs.sgl_version }}
            ghcr.io/${{ github.repository }}/sglang-gtx3090:cuda${{ env.CUDA_VERSION }}-${{ inputs.sgl_version }}
            ghcr.io/${{ github.repository }}/sglang-gtx3090:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CUDA_VERSION=${{ env.CUDA_VERSION }}
            USE_LATEST_SGLANG=${{ steps.sgl_config.outputs.use_latest }}
            SGL_VERSION=${{ steps.sgl_config.outputs.sgl_version }}
            BUILD_TYPE=${{ inputs.build_type }}
            BUILD_AND_DOWNLOAD_PARALLEL=8
            SGL_KERNEL_VERSION=0.3.21
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Summary
        if: success()
        run: |
          echo "## Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ghcr.io/${{ github.repository }}/sglang-gtx3090:${{ inputs.sgl_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**CUDA:** ${{ env.CUDA_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**SGLang:** ${{ inputs.sgl_version }}" >> $GITHUB_STEP_SUMMARY

      - name: Failure notification
        if: failure()
        run: |
          echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Please check the build logs." >> $GITHUB_STEP_SUMMARY
