# .github/workflows/build-sglang-gtx3090.yml
name: Build SGLang GTX3090 Docker Image

on:
  workflow_dispatch:  # 手动触发


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sglang-gtx3090
  UPSTREAM_REPO: lmsysorg/sglang
  DOCKERFILE_PATH: docker/Dockerfile.gtx3090  # 您仓库中的 Dockerfile 路径

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 推送镜像必需
    
    steps:
      # 1️⃣ 拉取上游 sglang 最新代码
      - name: Checkout upstream sglang
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          path: sglang-src
          fetch-depth: 1

      # 2️⃣ 拉取当前仓库获取自定义 Dockerfile
      - name: Checkout your repo for Dockerfile
        uses: actions/checkout@v4
        with:
          path: custom-config
          fetch-depth: 1

      # 3️⃣ 替换 Dockerfile
      - name: Replace Dockerfile
        run: |
          cp custom-config/${{ env.DOCKERFILE_PATH }} sglang-src/docker/Dockerfile
          echo "✅ Dockerfile replaced"
          ls -la sglang-src/docker/

      # 4️⃣ 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5️⃣ 登录 GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6️⃣ 生成镜像标签（latest + 日期 + commit sha）
      - name: Generate image tags
        id: meta
        run: |
          DATE_TAG=$(date +%Y%m%d)
          SHORT_SHA=$(cd sglang-src && git rev-parse --short HEAD)
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$DATE_TAG,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA" >> "$GITHUB_OUTPUT"

      # 7️⃣ 构建并推送镜像
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sglang-src
          file: ./sglang-src/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |  # 🔥 关键：传递您的 CUDA 版本
            CUDA_VERSION=12.2.2
            NVIDIA_DRIVER_CAPABILITIES=compute,utility

      # 8️⃣ 输出构建结果
      - name: Build Summary
        run: |
          echo "## 🎉 Build Completed" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Image | ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷️ Tags | latest, $(date +%Y%m%d), $(cd sglang-src && git rev-parse --short HEAD) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Upstream | [${{ env.UPSTREAM_REPO }}](https://github.com/${{ env.UPSTREAM_REPO }}) |" >> $GITHUB_STEP_SUMMARY
