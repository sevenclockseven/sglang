# SGLang Docker Build Workflow for GTX 3090
#
# Build SGLang Docker image for CentOS 7.9 host with GTX 3090 (CUDA 12.2.2 + Driver 535)
# Automatically pushes to GitHub Container Registry (ghcr.io)

name: Build SGLang GTX3090 Docker Image

on:
  workflow_dispatch:
  
env:
  DOCKER_BUILDKIT: 1
  CUDA_VERSION: "12.8"
  DOCKERFILE_PATH: docker/Dockerfile.gtx3090

  REGISTRY: ghcr.io
  IMAGE_NAME: sevenclockseven/sglang
  UPSTREAM_REPO: lmsysorg/sglang

jobs:
  

 build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            
            type=raw,value=latest

      - name: Checkout this repository for Dockerfile
        uses: actions/checkout@v4
        with:
          path: local-repo

      - name: Copy local Dockerfile
        run: |
          cp local-repo/docker/Dockerfile.gtx3090 upstream/docker/Dockerfile
          echo "Dockerfile copied to upstream directory"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push additional tags
        run: |
          # Push latest tag
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest 2>/dev/null || true
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          # Push date tag
          DATE_TAG=$(date +%Y%m%d)
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:lstest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$DATE_TAG
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$DATE_TAG

      - name: Notify
        run: |
          echo "构建完成！"
          echo "镜像: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:
          echo "Release: 
