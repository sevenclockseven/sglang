# .github/workflows/build-sglang-gtx3090.yml
name: Build SGLang GTX3090 Docker Image

on:
  workflow_dispatch:


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sglang-gtx3090
  UPSTREAM_REPO: sgl-project/sglang
  DOCKERFILE_PATH: docker/Dockerfile.gtx3090

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      # ✅ 修复：拉取上游代码 + 禁用认证
      - name: Checkout upstream sglang
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          path: sglang-src
          fetch-depth: 1
          persist-credentials: false  # 🔥 公共仓库匿名访问

      # 拉取当前仓库获取自定义 Dockerfile
      - name: Checkout your repo for Dockerfile
        uses: actions/checkout@v4
        with:
          path: custom-config
          fetch-depth: 1

      # 替换 Dockerfile
      - name: Replace Dockerfile
        run: |
          echo "📁 Checking custom-config directory:"
          ls -la custom-config/
          echo "📁 Checking target directory:"
          mkdir -p sglang-src/docker
          cp custom-config/${{ env.DOCKERFILE_PATH }} sglang-src/docker/Dockerfile
          echo "✅ Dockerfile replaced"
          head -5 sglang-src/docker/Dockerfile

      # 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 生成镜像标签
      - name: Generate image tags
        id: meta
        run: |
          DATE_TAG=$(date +%Y%m%d)
          SHORT_SHA=$(cd sglang-src && git rev-parse --short HEAD)
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$DATE_TAG,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "🏷️ Tags: latest, $DATE_TAG, $SHORT_SHA"

      # 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sglang-src
          file: ./sglang-src/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CUDA_VERSION=12.8.0
            NVIDIA_DRIVER_CAPABILITIES=compute,utility

      # 输出结果
      - name: Build Summary
        run: |
          echo "## 🎉 Build Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tags: \`latest\`, \`$(date +%Y%m%d)\`, \`$(cd sglang-src && git rev-parse --short HEAD)\`" >> $GITHUB_STEP_SUMMARY
