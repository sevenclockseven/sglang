# .github/workflows/build-sglang-gtx3090.yml
name: Build SGLang GTX3090 Docker Image

on:
  workflow_dispatch:


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sglang-gtx3090
  UPSTREAM_REPO: sgl-project/sglang
  UPSTREAM_BRANCH: main
  DOCKERFILE_PATH: docker/Dockerfile.gtx3090
  
  # Docker 构建参数
  CUDA_VERSION: "12.8.1"
  UBUNTU_VERSION: "22.04"
  SGL_VERSION: "0.4.0"  # 🔥 添加默认版本

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout upstream sglang
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ env.UPSTREAM_BRANCH }}
          path: sglang-src
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout your repo for Dockerfile
        uses: actions/checkout@v4
        with:
          path: custom-config
          fetch-depth: 1

      - name: Replace Dockerfile
        run: |
          mkdir -p sglang-src/docker
          cp -v custom-config/${{ env.DOCKERFILE_PATH }} sglang-src/docker/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          DATE_TAG=$(date +%Y%m%d)
          SHORT_SHA=$(cd sglang-src && git rev-parse --short HEAD)
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$DATE_TAG,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA" >> "$GITHUB_OUTPUT"

      # 🔥 关键修复：传递正确的构建参数
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sglang-src
          file: ./sglang-src/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BRANCH_TYPE=local
            USE_LATEST_SGLANG=0
            SGL_VERSION=${{ env.SGL_VERSION }}
            CUDA_VERSION=${{ env.CUDA_VERSION }}
            UBUNTU_VERSION=${{ env.UBUNTU_VERSION }}
            TORCH_CUDA_ARCH_LIST=8.6

      - name: Build Summary
        run: |
          echo "## 🎉 Build Completed" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔖 CUDA | \`${{ env.CUDA_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎮 GPU | GTX 3090 (Driver 570) |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 SGLang | \`${{ env.SGL_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
